<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta name="description" content="Access past exam papers easily. Filter by category, trade, and year." />
    <meta name="theme-color" content="#000000" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    
    <!-- Title -->
    <title>Exam Papers Platform - Past Papers Made Easy</title>
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background-color: #f9fafb;
        color: #111827;
      }
      
      /* Loading spinner */
      .initial-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid #e5e7eb;
        border-top-color: #000000;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .initial-loading.hide {
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loading" id="initial-loading">
        <div class="spinner"></div>
      </div>
    </div>
    
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      // Remove initial loading after React mounts
      window.addEventListener('load', () => {
        const loadingEl = document.getElementById('initial-loading');
        if (loadingEl) {
          setTimeout(() => {
            loadingEl.classList.add('hide');
            setTimeout(() => {
              loadingEl.style.display = 'none';
            }, 300);
          }, 500);
        }
      });
    </script>
  </body>
</html>
