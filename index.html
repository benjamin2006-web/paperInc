<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta name="description" content="Access past exam papers easily. Filter by category, trade, and year." />
    <meta name="theme-color" content="#000000" />
    
    <!-- Preconnect to external resources for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://paperincbackend.onrender.com" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    
    <!-- Title -->
    <title>Exam Papers Platform - Past Papers Made Easy</title>
    
    <!-- Preload critical assets -->
    <link rel="preload" as="image" href="/logo.png" />
    
    <!-- Network Information API for slow connection detection -->
    <script>
      // Detect slow connection and add class to body
      if ('connection' in navigator) {
        const connection = navigator.connection;
        if (connection.effectiveType === '2g' || connection.effectiveType === 'slow-2g') {
          document.documentElement.classList.add('slow-connection');
        }
        // Listen for connection changes
        connection.addEventListener('change', () => {
          if (connection.effectiveType === '2g' || connection.effectiveType === 'slow-2g') {
            document.documentElement.classList.add('slow-connection');
          } else {
            document.documentElement.classList.remove('slow-connection');
          }
        });
      }
      
      // Service Worker for offline support (optional)
      if ('serviceWorker' in navigator && navigator.onLine) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
      
      // Cache page for offline viewing
      window.addEventListener('load', () => {
        if ('caches' in window) {
          caches.open('paperinc-v1').then(cache => {
            cache.add('/');
            cache.add('/index.html');
            cache.add('/logo.png');
          });
        }
      });
    </script>
    
    <style>
      /* Critical CSS for faster initial render */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background-color: #f9fafb;
        color: #111827;
      }
      
      /* Loading spinner */
      .initial-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid #e5e7eb;
        border-top-color: #000000;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Hide initial loading after React mounts */
      .initial-loading.hide {
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease;
      }
      
      /* Slow connection optimizations */
      .slow-connection img {
        filter: blur(0) !important;
      }
      
      .slow-connection .animate-all {
        animation: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Initial loading indicator -->
      <div class="initial-loading" id="initial-loading">
        <div class="spinner"></div>
      </div>
    </div>
    
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      // Remove initial loading after React mounts
      window.addEventListener('load', () => {
        const loadingEl = document.getElementById('initial-loading');
        if (loadingEl) {
          setTimeout(() => {
            loadingEl.classList.add('hide');
            setTimeout(() => {
              loadingEl.style.display = 'none';
            }, 300);
          }, 500);
        }
      });
      
      // Network status monitoring for snake game
      let wasOffline = false;
      
      function updateNetworkStatus() {
        const isOnline = navigator.onLine;
        if (!isOnline && !wasOffline) {
          // Internet lost - snake game will be triggered by React
          console.log('🌐 Network lost');
          wasOffline = true;
          // Dispatch custom event for React
          window.dispatchEvent(new CustomEvent('connection-lost'));
        } else if (isOnline && wasOffline) {
          // Internet restored
          console.log('✅ Network restored');
          wasOffline = false;
          window.dispatchEvent(new CustomEvent('connection-restored'));
        }
      }
      
      window.addEventListener('online', updateNetworkStatus);
      window.addEventListener('offline', updateNetworkStatus);
      updateNetworkStatus();
      
      // Monitor slow connections
      if ('connection' in navigator) {
        const connection = navigator.connection;
        connection.addEventListener('change', () => {
          window.dispatchEvent(new CustomEvent('connection-change', {
            detail: { 
              type: connection.effectiveType,
          slow: connection.effectiveType === '2g' || connection.effectiveType === 'slow-2g'
            }
          }));
        });
      }
      
      // Prevent pinch zoom on PDF viewer (optional)
      document.addEventListener('gesturestart', function(e) {
        if (e.target.closest('.pdf-viewer')) {
          e.preventDefault();
        }
      });
    </script>
  </body>
</html>
